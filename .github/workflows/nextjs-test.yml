name: Next.js Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: nextjs
        run: npm ci

      - name: Run unit tests
        working-directory: nextjs
        env:
          JEST_JUNIT_OUTPUT_FILE: jest-report.xml
        run: npm test -- --ci --reporters=default --reporters=jest-junit
        continue-on-error: true

      - name: Enforce 90% pass rate
        run: python .github/scripts/check_test_pass_rate.py nextjs/jest-report.xml 0.90
