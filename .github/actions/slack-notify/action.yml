name: Notify Slack test results
description: Post CI test results to a Slack incoming webhook
inputs:
  suite:
    description: Test suite name shown in Slack
    required: true
  junit-xml:
    description: Optional path to JUnit XML report
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Notify Slack
      shell: bash
      env:
        SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
        SUITE: ${{ inputs.suite }}
        JUNIT_XML: ${{ inputs.junit-xml }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REF: ${{ github.head_ref || github.ref_name }}
        ACTOR: ${{ github.actor }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        JOB_STATUS: ${{ job.status }}
      run: |
        STATUS="success"
        if [ "$JOB_STATUS" = "failure" ] || [ "$JOB_STATUS" = "cancelled" ]; then
          STATUS="failure"
        fi

        python .github/scripts/slack_test_results.py \
          --suite "$SUITE" \
          --junit-xml "$JUNIT_XML" \
          --run-url "$RUN_URL" \
          --ref "$REF" \
          --actor "$ACTOR" \
          --status "$STATUS" \
          --pr-title "$PR_TITLE" \
          --pr-url "$PR_URL"
