apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-lgtm
  namespace: workout
  labels:
    app.kubernetes.io/name: otel-lgtm
    app.kubernetes.io/part-of: workout-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-lgtm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-lgtm
        app.kubernetes.io/part-of: workout-app
    spec:
      containers:
        - name: otel-lgtm
          image: grafana/otel-lgtm:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grafana
              containerPort: 3000
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: grafana
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: grafana
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}
