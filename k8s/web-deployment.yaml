apiVersion: apps/v1
kind: Deployment
metadata:
  name: workout-web
  namespace: workout
  labels:
    app.kubernetes.io/name: workout-web
    app.kubernetes.io/part-of: workout-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workout-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workout-web
        app.kubernetes.io/part-of: workout-app
    spec:
      containers:
        - name: web
          image: saifbiobaku/workout-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
