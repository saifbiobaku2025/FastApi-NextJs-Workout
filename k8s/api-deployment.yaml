apiVersion: apps/v1
kind: Deployment
metadata:
  name: workout-api
  namespace: workout
  labels:
    app.kubernetes.io/name: workout-api
    app.kubernetes.io/part-of: workout-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workout-api
        app.kubernetes.io/part-of: workout-app
    spec:
      containers:
        - name: api
          image: saifbiobaku/workout-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: workout-api-config
            - secretRef:
                name: workout-api-secret
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: workout-api-data
